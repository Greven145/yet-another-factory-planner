# yaml-language-server: $schema=https://raw.githubusercontent.com/Azure/azure-dev/main/schemas/v1.0/azure.yaml.json

name: yet-another-factory-planner
services:
  api:
    project: ./YetAnotherFactoryPlanner.AppHost/YetAnotherFactoryPlanner.AppHost.csproj
    language: dotnet
    host: containerapp
  web:
    project: ./client
    dist: dist
    language: js
    host: staticwebapp
    hooks:
      predeploy:
        windows:
          shell: pwsh
          run: |
            $apiUrl = azd env get-value SERVICE_API_ENDPOINT_URL
            if (-not $apiUrl) { throw "SERVICE_API_ENDPOINT_URL is empty — deploy api service before web" }
            Set-Content -Path .env.production -Value "VITE_REACT_APP_API_BASE_URL=$apiUrl"
        posix:
          shell: sh
          run: |
            apiUrl=$(azd env get-value SERVICE_API_ENDPOINT_URL)
            if [ -z "$apiUrl" ]; then echo "ERROR: SERVICE_API_ENDPOINT_URL is empty — deploy api service before web" >&2; exit 1; fi
            echo "VITE_REACT_APP_API_BASE_URL=$apiUrl" > .env.production
