name: CI

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  build-and-test:
    name: Build & Test (.NET)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5
        with:
          dotnet-version: '10.x'

      - name: Restore
        run: dotnet restore api.sln

      - name: Build
        run: dotnet build api.sln --no-restore --configuration Release

      - name: Test
        run: >
          dotnet test api.Tests/api.Tests.csproj
          --no-build
          --configuration Release
          --logger trx
          --results-directory TestResults

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: test-results
          path: TestResults

  build-frontend:
    name: Build (Frontend)
    runs-on: ubuntu-latest
    # Run inside the prebuilt CI image (Playwright browsers + system libs +
    # Node 24 + baked npm deps), published by build-ci-image.yml. This removes
    # the per-run `npm ci` + `playwright install --with-deps` cost. --ipc=host
    # is Playwright's recommended flag to stop Chromium running out of memory.
    container:
      image: ghcr.io/greven145/yet-another-factory-planner/frontend-ci@sha256:56b9e36b41b193f3f911b85d8af6a67867b506b974b3ad66a3e1864ae7ee85f4 # :latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
      options: --ipc=host

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      # The baked dependencies live at /opt/ci/node_modules in the image; the
      # checkout above is a fresh tree, so copy them into the workspace. The
      # image is rebuilt whenever client/package-lock.json changes, so this
      # stays in sync with the committed lockfile.
      - name: Restore baked node_modules
        working-directory: client
        run: cp -a /opt/ci/node_modules ./node_modules

      - name: Lint (ESLint + jsx-a11y)
        working-directory: client
        run: npm run lint

      - name: Unit tests (Vitest + jest-axe)
        working-directory: client
        run: npm run test

      - name: Build
        working-directory: client
        run: npm run build

      - name: Lighthouse accessibility score
        working-directory: client
        run: npm run a11y:lhci

      # Blocking gate: the scanned surfaces must report zero WCAG 2.0 A/AA
      # violations (axe-core via Playwright). The graph canvas is excluded as a
      # separate tracked follow-up; see client/tests/a11y.spec.ts.
      # GitHub sets HOME=/github/home for container jobs and that dir isn't
      # owned by root, so Firefox/WebKit refuse to launch ("$HOME isn't owned
      # by the current user"). Point HOME at the root-owned /root, as Playwright
      # advises. Scoped to this step only — a job-level HOME leaks to the host
      # runner and breaks its docker config lookup (/root/.docker/config.json).
      - name: Accessibility e2e (axe)
        working-directory: client
        env:
          HOME: /root
        run: npm run test:e2e

      - name: Upload accessibility reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: frontend-a11y-reports
          path: |
            client/playwright-report
            client/.lighthouseci
          if-no-files-found: ignore

  # Production deploy gate: this job only runs after both build jobs above
  # succeed, and only on a push to main or a manual run. A red CI therefore
  # blocks the deploy. Manual runs (workflow_dispatch) still run CI first.
  #
  # Blue-green strategy:
  #   API  — ACA Multiple-revision mode; azd deploys green at 0% traffic;
  #           smoke passes → shift 100%; smoke fails → rollback, job fails.
  #   Client — SWA Free tier preview environment; smoke passes → promote to
  #             production (no rebuild); smoke fails → keep old production.
  deploy:
    name: Deploy to Azure
    needs: [build-and-test, build-frontend]
    # Only ever deploy main: a push to main, or a manual run targeting main.
    # workflow_dispatch can be launched from any branch, so guard the ref too.
    if: >-
      github.ref == 'refs/heads/main'
      && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    # Hard cap so a hung step (e.g. a wedged smoke test) can never run for hours and
    # hold the deploy-production concurrency lock. Generous enough for provision + both
    # blue-green deploys.
    timeout-minutes: 30
    # Serialize production deploys so overlapping merges to main don't run
    # concurrent azd provision/deploy against the same environment.
    concurrency:
      group: deploy-production
      cancel-in-progress: false
    permissions:
      id-token: write
      contents: read
    env:
      AZURE_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
      AZURE_ENV_NAME: ${{ vars.AZURE_ENV_NAME }}
      AZURE_LOCATION: ${{ vars.AZURE_LOCATION }}
      # scripts/aca-bluegreen.sh reads ACA_RESOURCE_GROUP and ACA_APP_NAME.
      # The container-app name is hardcoded to "api" in the bicep (name: 'api');
      # the resource group is the rg-<AZURE_ENV_NAME> that infra/main.bicep
      # creates (resourceGroups name: 'rg-${environmentName}'), so this default
      # is exact — azd does not expose AZURE_RESOURCE_GROUP as an output.
      ACA_APP_NAME: api
      ACA_RESOURCE_GROUP: rg-${{ vars.AZURE_ENV_NAME }}
      DOTNET_NOLOGO: true
      DOTNET_CLI_TELEMETRY_OPTOUT: true
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Install azd
        uses: Azure/setup-azd@634ad924cf8baef2257898ba5663be8d19f15aca # v2

      - name: Setup .NET
        uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5
        with:
          dotnet-version: '10.x'

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          # Match the Node version CI validates the client under (build-frontend
          # uses 24) so the shipped artifact is built on the same runtime.
          node-version: '24'

      - name: Log in with Azure (Federated Credentials)
        run: |
          azd auth login \
            --client-id "$AZURE_CLIENT_ID" \
            --federated-credential-provider "github" \
            --tenant-id "$AZURE_TENANT_ID"

      # azd and the az CLI keep separate auth contexts. scripts/aca-bluegreen.sh
      # drives blue-green traffic with `az containerapp`, so the az CLI needs its
      # own OIDC login (same federated credential; uses the job's id-token: write).
      - name: Log in to Azure CLI (Federated Credentials)
        uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5 # v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      # ── Infra ────────────────────────────────────────────────────────────────
      - name: Provision Infrastructure
        run: azd provision --no-prompt

      # ── API blue-green ────────────────────────────────────────────────────────
      # Resolve the current production ("blue") revision and pin it for the deploy. The API
      # bicep keeps 100% of ingress traffic on api_blue_revision (fed via BLUE_REVISION), so
      # `azd deploy api` lands the new ("green") revision at 0% instead of letting ACA reset
      # traffic to 100%→latest. Empty on a greenfield deploy → bicep falls back to
      # latestRevision. Also exported to the env for the rollback step's target.
      - name: Resolve production (blue) revision
        id: resolve_blue
        run: |
          set -euo pipefail
          blue=$(bash scripts/aca-bluegreen.sh current-revision)
          echo "Current production (blue) revision: ${blue:-<none / greenfield>}"
          azd env set BLUE_REVISION "$blue"
          echo "BLUE_REVISION=$blue" >> "$GITHUB_ENV"

      # azd deploy creates a new ACA revision. Traffic stays pinned to blue (above), so the
      # new revision lands at 0%; smoke validates it before any shift.
      - name: Deploy API
        id: deploy_api
        run: azd deploy api --no-prompt

      # Verify a new (green) revision exists and differs from blue. No traffic change.
      - name: Verify green revision
        id: green_check
        run: bash scripts/aca-bluegreen.sh deploy-green

      # Smoke-test the green revision. The script resolves green's revision-specific FQDN and
      # runs scripts/smoke-api.sh against it internally, exiting non-zero on failure.
      - name: Smoke-test API (green revision)
        id: api_smoke
        run: bash scripts/aca-bluegreen.sh smoke

      # Promote green: set 100% of traffic to the new revision. Only on smoke success.
      - name: Shift API traffic to green
        if: success()
        run: bash scripts/aca-bluegreen.sh shift

      # Failure safety net. Smoke runs before shift, so a pre-shift failure leaves traffic on
      # blue and production is unaffected; rollback re-pins BLUE_REVISION to be safe. Gated on
      # resolve_blue so a blue revision is known. The job still exits red (failure() is only
      # true when failing).
      - name: Rollback API to blue on failure
        if: failure() && steps.resolve_blue.outcome == 'success'
        run: bash scripts/aca-bluegreen.sh rollback

      # ── Client blue-green (SWA Free tier) ─────────────────────────────────────
      # Build the client ONCE here; it is uploaded twice (preview → production)
      # without a second build.
      - name: Build web client
        run: |
          set -euo pipefail
          caDomain=$(azd env get-value AZURE_CONTAINER_APPS_ENVIRONMENT_DEFAULT_DOMAIN)
          if [ -z "$caDomain" ]; then
            echo "ERROR: AZURE_CONTAINER_APPS_ENVIRONMENT_DEFAULT_DOMAIN is empty — provision must run first" >&2
            exit 1
          fi
          apiUrl="https://api.$caDomain"
          echo "VITE_API_BASE_URL=$apiUrl" > client/.env.production
          npm ci --prefix client
          npm run build --prefix client

      # Upload to a named SWA preview environment ("staging").  The action's
      # static_web_app_url output exposes the preview URL for smoke testing.
      - name: Deploy client to SWA preview (staging)
        id: swa_preview
        uses: Azure/static-web-apps-deploy@1a947af9992250f3bc2e68ad0754c0b0c11566c9 # v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: client/dist
          skip_app_build: true
          deployment_environment: staging

      # Smoke-test the preview deployment: confirm it serves the app shell (HTTP 200
      # + the React root div) before promoting to production. This is an HTTP-level
      # check on purpose — a full browser-driven Playwright run in the deploy job
      # downloads ~170 MB of browser per run and proved unreliable on the bare runner
      # (browser-artifact downloads stalled). The client's functional behaviour
      # (create -> share -> restore) is covered by the e2e suite in build-frontend,
      # and the API round-trip by the API smoke above; here we just verify the static
      # deploy is live. (The Playwright smoke spec remains in client/ for local runs.)
      - name: Smoke-test client (SWA preview)
        id: client_smoke
        timeout-minutes: 5
        env:
          PREVIEW_URL: ${{ steps.swa_preview.outputs.static_web_app_url }}
        run: |
          set -euo pipefail
          echo "Smoke-testing client preview: $PREVIEW_URL"
          for attempt in $(seq 1 10); do
            code=$(curl -sS -o /tmp/preview-index.html -w '%{http_code}' --max-time 30 "$PREVIEW_URL/" || echo "000")
            if [ "$code" = "200" ] && grep -q 'id="root"' /tmp/preview-index.html; then
              echo "Preview is live: HTTP 200 and app shell present."
              exit 0
            fi
            echo "attempt $attempt: http=$code, app shell not ready yet; retrying in 10s..."
            sleep 10
          done
          echo "ERROR: client preview did not serve the app shell (last http=$code)." >&2
          exit 1

      # Promote the already-built client/dist to production by re-uploading
      # WITHOUT the deployment_environment input.  No rebuild occurs.
      # Explicitly gated on the client smoke succeeding so production keeps the
      # old version on a smoke failure.
      - name: Promote client to SWA production
        if: steps.client_smoke.outcome == 'success'
        uses: Azure/static-web-apps-deploy@1a947af9992250f3bc2e68ad0754c0b0c11566c9 # v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: client/dist
          skip_app_build: true
          # No deployment_environment → targets the production slot.
